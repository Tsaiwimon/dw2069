[tool:pytest]
DJANGO_SETTINGS_MODULE = tsaiwimon.settings
python_files = tests.py test_*.py *_tests.py
addopts = --cov=apps --cov-report=html --cov-report=term-missing
testpaths = tests

[coverage:run]
source = apps
omit = 
    */migrations/*
    */tests.py
    manage.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
