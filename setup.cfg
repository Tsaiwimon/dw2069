[flake8]
max-line-length = 100
exclude = 
    .git,
    __pycache__,
    build,
    dist,
    .venv,
    migrations,
    .eggs
ignore = E203, W503, W504

[isort]
profile = black
line_length = 100
skip_gitignore = true
known_django = django
known_first_party = apps
sections = FUTURE,STDLIB,DJANGO,THIRDPARTY,FIRSTPARTY,LOCALFOLDER
