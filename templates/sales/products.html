{% extends 'sales/base.html' %}
{% load static %}

{% block title %}สินค้าทั้งหมด - Tsaiwimon{% endblock %}

{% block content %}
<div class="container">
    <div class="products-page">
        <!-- Sidebar Filters -->
        <aside class="sidebar">
            <div class="filter-section">
                <h3>หมวดหมู่</h3>
                <div class="filter-group">
                    <label><input type="checkbox"> อิเล็กโทรนิกส์</label>
                    <label><input type="checkbox"> ファッション</label>
                    <label><input type="checkbox"> บ้านและสวน</label>
                    <label><input type="checkbox"> หนังสือและสื่อ</label>
                    <label><input type="checkbox"> เกมและของเล่น</label>
                    <label><input type="checkbox"> อาหารและเครื่องดื่ม</label>
                </div>
            </div>

            <div class="filter-section">
                <h3>ราคา</h3>
                <div class="price-range">
                    <input type="range" min="0" max="10000" value="0" class="price-slider-min">
                    <input type="range" min="0" max="10000" value="10000" class="price-slider-max">
                    <div class="price-display">
                        <span id="price-min">0</span>฿ - <span id="price-max">10,000</span>฿
                    </div>
                </div>
            </div>

            <div class="filter-section">
                <h3>คะแนนการประเมิน</h3>
                <div class="filter-group">
                    <label><input type="radio" name="rating"> ⭐⭐⭐⭐⭐ 5 ดาว</label>
                    <label><input type="radio" name="rating"> ⭐⭐⭐⭐ 4 ดาวขึ้นไป</label>
                    <label><input type="radio" name="rating"> ⭐⭐⭐ 3 ดาวขึ้นไป</label>
                    <label><input type="radio" name="rating"> ⭐⭐ 2 ดาวขึ้นไป</label>
                </div>
            </div>

            <div class="filter-section">
                <h3>สถานะจัดส่ง</h3>
                <div class="filter-group">
                    <label><input type="checkbox"> ส่งฟรี</label>
                    <label><input type="checkbox"> ส่งต่างจังหวัด</label>
                    <label><input type="checkbox"> ส่งได้เดือนนี้</label>
                </div>
            </div>

            <button class="btn btn-secondary btn-block">ล้างตัวกรอง</button>
        </aside>

        <!-- Main Products Area -->
        <section class="main-content">
            <div class="products-toolbar">
                <div class="sort-options">
                    <label>เรียงลำดับ:</label>
                    <select id="sort-select" onchange="sortProducts(this.value)">
                        <option value="">ทั่วไป</option>
                        <option value="price-asc">ราคา: ต่ำถึงสูง</option>
                        <option value="price-desc">ราคา: สูงถึงต่ำ</option>
                        <option value="new">สินค้าใหม่</option>
                        <option value="popular">ขายดี</option>
                        <option value="rating">คะแนนสูง</option>
                    </select>
                </div>
                <div class="view-options">
                    <button class="view-btn grid-view active" onclick="changeView('grid')">
                        <i class="fas fa-th"></i>
                    </button>
                    <button class="view-btn list-view" onclick="changeView('list')">
                        <i class="fas fa-list"></i>
                    </button>
                </div>
            </div>

            <!-- Products Grid -->
            <div class="products-grid" id="products-container">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i> กำลังโหลดสินค้า...
                </div>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination">
                <!-- Pagination will be generated by JavaScript -->
            </div>
        </section>
    </div>
</div>

<script>
    let currentPage = 1;
    let currentSort = '';

    function loadProducts(page = 1, sort = '') {
        let url = `/api/v1/ecommerce/products/?page=${page}&limit=12`;
        
        if (sort === 'price-asc') url += '&ordering=price';
        else if (sort === 'price-desc') url += '&ordering=-price';
        else if (sort === 'new') url += '&ordering=-created_at';
        else if (sort === 'rating') url += '&ordering=-rating';

        const searchParams = new URLSearchParams(window.location.search);
        if (searchParams.has('search')) {
            url += `&search=${searchParams.get('search')}`;
        }

        fetch(url)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('products-container');
                container.innerHTML = '';

                if (data.results && data.results.length > 0) {
                    data.results.forEach(product => {
                        container.innerHTML += `
                            <div class="product-card">
                                <div class="product-image">
                                    <img src="${product.image || '/static/images/no-image.png'}" alt="${product.name}">
                                    ${product.discount_percent ? `<span class="discount-badge">-${product.discount_percent}%</span>` : ''}
                                    <div class="product-hover">
                                        <a href="/sales/product/${product.id}/" class="btn btn-white btn-small">
                                            <i class="fas fa-eye"></i> ดู
                                        </a>
                                    </div>
                                </div>
                                <div class="product-info">
                                    <h3><a href="/sales/product/${product.id}/">${product.name}</a></h3>
                                    <p class="product-category">${product.category_name || 'อื่นๆ'}</p>
                                    <div class="product-rating">
                                        <span class="stars">★★★★★</span>
                                        <span class="rating-count">(${product.review_count || 0})</span>
                                    </div>
                                    <div class="product-price">
                                        <span class="current-price">${product.sale_price || product.price}฿</span>
                                        ${product.price !== product.sale_price ? `<span class="original-price">${product.price}฿</span>` : ''}
                                    </div>
                                    <button class="btn btn-primary btn-block btn-add-cart" data-product-id="${product.id}">
                                        <i class="fas fa-shopping-cart"></i> เพิ่มลงตะกร้า
                                    </button>
                                </div>
                            </div>
                        `;
                    });

                    // Update pagination
                    const pagination = document.getElementById('pagination');
                    pagination.innerHTML = '';
                    
                    const totalPages = Math.ceil(data.count / 12);
                    for (let i = 1; i <= totalPages; i++) {
                        const btn = document.createElement('button');
                        btn.textContent = i;
                        btn.className = i === page ? 'page-btn active' : 'page-btn';
                        btn.onclick = () => {
                            currentPage = i;
                            loadProducts(i, currentSort);
                            window.scrollTo(0, 0);
                        };
                        pagination.appendChild(btn);
                    }
                } else {
                    container.innerHTML = '<p class="no-products">ไม่พบสินค้า</p>';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('products-container').innerHTML = '<p>เกิดข้อผิดพลาดในการโหลดสินค้า</p>';
            });
    }

    function sortProducts(sort) {
        currentSort = sort;
        currentPage = 1;
        loadProducts(1, sort);
    }

    function changeView(view) {
        document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.${view}-view`).classList.add('active');
        document.getElementById('products-container').classList.toggle('list-view', view === 'list');
    }

    // Load products on page load
    loadProducts(1);

    // Add to cart functionality
    document.addEventListener('click', function(e) {
        if (e.target.closest('.btn-add-cart')) {
            const productId = e.target.closest('.btn-add-cart').dataset.productId;
            alert(`เพิ่มสินค้า ${productId} ลงตะกร้า (API integration needed)`);
        }
    });
</script>
{% endblock %}
