version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: tsaiwimon
      POSTGRES_USER: tsaiwimon
      POSTGRES_PASSWORD: tsaiwimon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=docker-secret-key-change-in-production
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=tsaiwimon
      - DB_USER=tsaiwimon
      - DB_PASSWORD=tsaiwimon
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: celery -A tsaiwimon worker -l info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=docker-secret-key-change-in-production
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=tsaiwimon
      - DB_USER=tsaiwimon
      - DB_PASSWORD=tsaiwimon
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
