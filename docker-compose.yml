services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: tsaiwimon
      POSTGRES_USER: tsaiwimon
      POSTGRES_PASSWORD: tsaiwimon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_server
    ports:
      - "8123:8123"  # HTTP Port (ใช้กับ clickhouse-connect ใน Python)
      - "9000:9000"  # Native Client Port
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=tsaiwimon_analytics  # ชื่อฐานข้อมูล ClickHouse
      - CLICKHOUSE_USER=tsaiwimon
      - CLICKHOUSE_PASSWORD=tsaiwimon_pass
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # เพิ่ม Service สำหรับ ClickHouse Client ตรงนี้ตามสั่งอาจารย์ครับ
  clickhouse-client:
    image: clickhouse/clickhouse-client:latest
    container_name: clickhouse_client_cli
    entrypoint:
      - clickhouse-client
      - --host=clickhouse
      - --user=tsaiwimon
      - --password=tsaiwimon_pass
      - --database=tsaiwimon_analytics
    depends_on:
      - clickhouse

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=docker-secret-key-change-in-production
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=tsaiwimon
      - DB_USER=tsaiwimon
      - DB_PASSWORD=tsaiwimon
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=tsaiwimon
      - CLICKHOUSE_PASSWORD=tsaiwimon_pass
      - CLICKHOUSE_DB=tsaiwimon_analytics
    depends_on:
      - db
      - redis
      - clickhouse

  celery:
    build: .
    command: celery -A tsaiwimon worker -l info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=docker-secret-key-change-in-production
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=tsaiwimon
      - DB_USER=tsaiwimon
      - DB_PASSWORD=tsaiwimon
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=tsaiwimon
      - CLICKHOUSE_PASSWORD=tsaiwimon_pass
      - CLICKHOUSE_DB=tsaiwimon_analytics
    depends_on:
      - db
      - redis
      - clickhouse

volumes:
  postgres_data:
  clickhouse_data:  # ตัวเก็บข้อมูลของ ClickHouse ไม่ให้หายเวลาปิด container